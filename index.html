<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NiTriTe V26.0</title>

    <!-- Couleur de fond immédiate — élimine le flash blanc/noir avant Vue -->
    <style>
      html, body {
        margin: 0; padding: 0;
        background: #09090b;
        color: #fafafa;
        height: 100%;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      #app { height: 100vh; }

      /* Écran de démarrage natif : visible AVANT que Vue monte */
      #native-boot {
        position: fixed; inset: 0;
        background: #09090b;
        display: flex; align-items: center; justify-content: center;
        z-index: 99998;
        transition: opacity 0.4s ease;
      }
      #native-boot.hidden { opacity: 0; pointer-events: none; }
      #native-boot-inner {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
      }
      #native-boot-logo {
        width: 72px; height: 72px; border-radius: 16px;
        background: #1c1c20;
        box-shadow: 0 0 32px rgba(249,115,22,0.35);
        animation: nb-bounce 0.5s ease forwards;
      }
      @keyframes nb-bounce {
        0%   { transform: scale(0.7); opacity: 0; }
        70%  { transform: scale(1.05); }
        100% { transform: scale(1); opacity: 1; }
      }
      #native-boot-title {
        font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
        background: linear-gradient(135deg, #fafafa 40%, #f97316);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #native-boot-bar-wrap {
        width: 180px; height: 3px;
        background: #27272a; border-radius: 99px; overflow: hidden;
        margin-top: 6px;
      }
      #native-boot-bar {
        height: 100%;
        background: linear-gradient(90deg, #ea580c, #f97316);
        border-radius: 99px;
        animation: nb-progress 1.2s ease-in-out forwards;
      }
      @keyframes nb-progress { from { width: 0% } to { width: 55% } }
      #native-boot-sub {
        font-size: 11px; color: #52525b;
        font-family: "Courier New", monospace;
        letter-spacing: 0.04em;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Préloader natif HTML — affiché INSTANTANÉMENT, avant tout JS -->
    <div id="native-boot">
      <div id="native-boot-inner">
        <div id="native-boot-logo"></div>
        <div id="native-boot-title">NiTriTe</div>
        <div id="native-boot-bar-wrap"><div id="native-boot-bar"></div></div>
        <div id="native-boot-sub">Chargement…</div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <!-- Masquer le préloader natif dès que Vue prend le relais -->
    <script>
      window.__hideNativeBoot = function() {
        var el = document.getElementById('native-boot');
        if (el) { el.classList.add('hidden'); setTimeout(function(){ el.remove(); }, 500); }
      };
    </script>
  </body>
</html>
